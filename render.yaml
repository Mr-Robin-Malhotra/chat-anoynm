# Render.com blueprint. Deploys the C relay from the Dockerfile, no card needed.
services:
  - type: web
    name: chat-anoynm
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /        # server returns 200 "chat-anoynm relay ok" to plain GET
    envVars:
      - key: PORT
        value: "10000"        # Render's default expected port; server reads $PORT
