# Fly.io config for the C WebSocket relay.
# Deploy with:  fly launch --no-deploy   (first time, to create the app)
#               fly deploy
app = "chat-anoynm-relay"
primary_region = "bom"  # Mumbai, close to Delhi

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0  # scales to zero when idle (free-tier friendly)

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
